name: Test, build and deploy to GitHub Pages

on:
  push:
    branches: [main, claude/monorepo-restructure]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Oracle for the whole monorepo: shared kernel + gallery tests, plus a
  # typecheck of @rsvis/math. Runs on every branch so PRs get a signal.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:math

  # Build both projects and publish ONE site: gallery at the root, bundle
  # under /bundle/. Deploy only from main — the github-pages environment
  # restricts deployments to the default branch, so this is skipped on PR
  # branches (test above is the PR signal).
  publish:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:gallery
      - run: npm run build:bundle
      - name: Assemble combined site (gallery at root, bundle under /bundle)
        run: |
          rm -rf _site
          mkdir -p _site/bundle
          cp -r gallery/dist/. _site/
          cp -r bundle/dist/. _site/bundle/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
