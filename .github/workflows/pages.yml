name: Test, build and deploy to GitHub Pages

on:
  push:
    branches: [claude/charming-volta-8l8bit, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # The project oracle: must be green regardless of Pages enablement.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  # Publishing fails (only) while GitHub Pages is not yet enabled in
  # Settings -> Pages -> Source: GitHub Actions. enablement: true cannot do it
  # from CI: the workflow token gets "Resource not accessible by integration"
  # (repo admin is required). Once enabled, re-run this workflow.
  publish:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
